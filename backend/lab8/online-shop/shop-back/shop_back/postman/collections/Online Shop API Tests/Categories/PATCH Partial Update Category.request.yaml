$kind: http-request
name: PATCH Partial Update Category
method: PATCH
url: '{{baseUrl}}/api/categories/{{categoryId}}/'
order: 5000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Gadgets"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Name equals Gadgets", function () {
          const json = pm.response.json();
          pm.expect(json.name).to.eql("Gadgets");
      });
