$kind: http-request
name: PUT Update Product
method: PUT
url: '{{baseUrl}}/api/products/{{productId}}/'
order: 4000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Gaming Laptop",
      "price": 1299.99,
      "description": "A high-end gaming laptop",
      "count": 5,
      "is_active": true,
      "category": {"name": "Electronics"}
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Name equals Gaming Laptop", function () {
          const json = pm.response.json();
          pm.expect(json.name).to.eql("Gaming Laptop");
      });

      pm.test("Price equals 1299.99", function () {
          const json = pm.response.json();
          pm.expect(parseFloat(json.price)).to.eql(1299.99);
      });
