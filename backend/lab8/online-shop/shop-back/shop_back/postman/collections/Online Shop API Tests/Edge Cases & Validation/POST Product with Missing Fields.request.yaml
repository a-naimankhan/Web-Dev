$kind: http-request
name: POST Product with Missing Fields
method: POST
url: '{{baseUrl}}/api/products/'
order: 4000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Incomplete"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 400", function () {
          pm.response.to.have.status(400);
      });
