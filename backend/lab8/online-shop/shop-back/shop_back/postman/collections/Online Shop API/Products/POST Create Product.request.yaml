$kind: http-request
name: POST Create Product
method: POST
url: '{{base_url}}/products/'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "New Product",
      "price": 100.0,
      "description": "Text",
      "count": 10,
      "is_active": true,
      "category": 1
    }
