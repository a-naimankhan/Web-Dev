<section *ngIf="loading">Loading...</section>

<ng-template #show>
  <section *ngIf="album">
    <h2>Album {{ album.id }}</h2>
    <p><strong>Title:</strong></p>
    <input [(ngModel)]="album.title" name="title" />
    <div class="actions">
      <button class="primary" (click)="save()">Save</button>
      <button (click)="back()">Back</button>
      <a [routerLink]="['/albums', album.id, 'photos']">Photos</a>
    </div>
  </section>
</ng-template>
